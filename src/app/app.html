<div
  class="relative min-h-screen font-display antialiased transition-colors duration-300 bg-base-100 text-base-content"
>
  <!-- Background gradient effects -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden" aria-hidden="true">
    <div
      class="absolute top-[-20%] left-[20%] w-[50%] h-[50%] rounded-full bg-primary/10 blur-[130px]"
    ></div>
    <div
      class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-info/5 blur-[120px]"
    ></div>
  </div>

  <!-- Layout switcher based on device breakpoint -->
  @switch (deviceService.device()) {
    @case ('mobile') {
      <app-mobile-page />
    }
    @case ('tablet') {
      <app-tablet-page />
    }
    @case ('desktop') {
      <app-desktop-page />
    }
  }
</div>
