<div
  class="relative min-h-screen font-display antialiased transition-colors duration-300 bg-base-100 text-base-content"
>
  <!-- Decorative background glow effects -->
  <div
    class="absolute inset-0 z-0 pointer-events-none overflow-hidden bg-decorative"
    aria-hidden="true"
  ></div>

  <!-- Layout switcher based on device breakpoint -->
  @switch (deviceService.device()) {
    @case ('mobile') {
      <app-mobile-page />
    }
    @case ('tablet') {
      <app-tablet-page />
    }
    @case ('desktop') {
      <app-desktop-page />
    }
  }
</div>
