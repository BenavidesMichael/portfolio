<div
  class="relative min-h-screen font-display antialiased transition-colors duration-300 bg-slate-50 dark:bg-background-dark text-slate-900 dark:text-white"
>
  <!-- Background Effects -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div
      class="absolute top-[-20%] left-[20%] w-[50%] h-[50%] rounded-full bg-primary-brand/5 dark:bg-primary-brand/10 blur-[130px]"
    ></div>
    <div
      class="absolute bottom-[-10%] right-[-10%] dark:left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-400/5 dark:bg-blue-600/5 blur-[120px]"
    ></div>
  </div>

  <!-- Layout Switcher: Renders the appropriate page component based on device -->
  @switch (deviceService.device()) {
    @case ('mobile') {
      <app-mobile-page />
    }
    @case ('tablet') {
      <app-tablet-page />
    }
    @case ('desktop') {
      <app-desktop-page />
    }
  }
</div>
