<app-navbar />

<main class="relative z-10 pt-28">
  <div class="max-w-4xl mx-auto px-4">
    <!-- Hero Section - Loaded immediately (above the fold) -->
    <div id="home">
      <app-hero-section />
    </div>

    <!-- About Section - Deferred until viewport (Angular 21 @defer) -->
    <div id="about">
      @defer (on viewport; prefetch on idle) {
        <app-about-section />
      } @placeholder {
        <app-loading-placeholder />
      }
    </div>

    <!-- Skills Section - Deferred until viewport -->
    <div id="skills">
      @defer (on viewport; prefetch on idle) {
        <app-skills-section />
      } @placeholder {
        <app-loading-placeholder />
      }
    </div>

    <!-- Contact Section - Deferred until viewport -->
    <div id="contact">
      @defer (on viewport; prefetch on idle) {
        <app-contact-section />
      } @placeholder {
        <app-loading-placeholder />
      }
    </div>
  </div>
</main>

<!-- Footer - Deferred until viewport with idle prefetch -->
@defer (on viewport; prefetch on idle) {
  <app-desktop-footer />
} @placeholder {
  <div class="h-64"></div>
}
