<header
  class="fixed top-0 left-0 right-0 z-50 flex justify-center transition-[padding] duration-500 ease-out"
  [class.scrolled]="isScrolled()"
>
  <nav
    class="w-full flex items-center justify-between transition-[padding,background-color,border-radius,box-shadow,max-width] duration-500 ease-out"
    [class.scrolled]="isScrolled()"
    role="navigation"
    aria-label="Main navigation"
  >
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div class="p-2 rounded-full bg-primary/10 text-primary border border-primary/20">
        <app-icon-terminal />
      </div>
      <span class="font-bold text-lg tracking-tight font-display"> Benavides Michael </span>
    </div>

    <!-- Navigation Links -->
    <ul class="menu menu-horizontal gap-2 px-0">
      @for (link of navLinks; track link.href) {
        <li>
          <a
            [href]="link.href"
            [class.active]="activeLink() === link.href"
            class="text-sm font-medium"
            (click)="activeLink.set(link.href)"
          >
            {{ link.label | transloco }}
          </a>
        </li>
      }
    </ul>

    <!-- Right Section: Lang, Theme, Social -->
    <div class="flex items-center gap-2">
      <!-- Language Selector -->
      <app-language-switcher />

      <div class="divider divider-horizontal mx-0 w-0"></div>

      <!-- Theme Toggle -->
      <app-theme-toggle />

      <!-- GitHub Link -->
      <a
        href="https://github.com/BenavidesMichael/portfolio"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-ghost btn-circle btn-sm"
        aria-label="GitHub profile"
      >
        <app-icon-github />
      </a>

      <!-- Email Link -->
      <a
        href="mailto:contact@example.com"
        class="btn btn-ghost btn-circle btn-sm"
        aria-label="Send email"
      >
        <app-icon-mail />
      </a>
    </div>
  </nav>
</header>
