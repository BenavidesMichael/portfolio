<header
  class="fixed top-0 left-0 right-0 z-50 flex justify-center transition-all duration-500 ease-out"
  [class.px-4]="!isScrolled()"
  [class.px-0]="isScrolled()"
  [class.pt-6]="!isScrolled()"
  [class.pt-0]="isScrolled()"
>
  <nav
    class="w-full flex items-center justify-between transition-all duration-500 ease-out"
    [class.max-w-[960px]]="!isScrolled()"
    [class.max-w-full]="isScrolled()"
    [class.rounded-full]="!isScrolled()"
    [class.rounded-none]="isScrolled()"
    [class.px-5]="!isScrolled()"
    [class.px-8]="isScrolled()"
    [class.md:px-16]="isScrolled()"
    [class.py-3]="!isScrolled()"
    [class.py-4]="isScrolled()"
    [class.glass-panel]="themeService.isDark() && !isScrolled()"
    [class.glass-panel-light]="!themeService.isDark() && !isScrolled()"
    [class.bg-surface-dark]="themeService.isDark() && isScrolled()"
    [class.bg-white]="!themeService.isDark() && isScrolled()"
    [class.border-b]="isScrolled()"
    [class.border-white/10]="isScrolled() && themeService.isDark()"
    [class.border-slate-200]="isScrolled() && !themeService.isDark()"
    [class.shadow-lg]="isScrolled()"
    [class.shadow-black/20]="isScrolled() && themeService.isDark()"
    [class.shadow-black/5]="isScrolled() && !themeService.isDark()"
    role="navigation"
    aria-label="Main navigation"
  >
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div
        class="p-2 rounded-full border transition-colors bg-primary-brand/20 dark:bg-primary-brand/10 text-primary-brand-dark dark:text-primary-brand border-primary-brand/30 dark:border-primary-brand/20"
      >
        <app-icon-terminal></app-icon-terminal>
      </div>
      <span
        class="font-bold text-lg tracking-tight font-display text-slate-800 dark:text-slate-100"
      >
        Benavides Michael
      </span>
    </div>

    <!-- Navigation Links -->
    <div class="flex items-center gap-8">
      @for (link of navLinks; track link.href) {
        <a
          [href]="link.href"
          [attr.data-active]="activeLink() === link.label.toLowerCase() ? true : null"
          class="text-sm font-medium transition-colors relative text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white data-[active]:text-slate-800 data-[active]:dark:text-white data-[active]:after:content-[''] data-[active]:after:absolute data-[active]:after:-bottom-1 data-[active]:after:left-0 data-[active]:after:w-full data-[active]:after:h-0.5 data-[active]:after:bg-primary-brand data-[active]:after:rounded-full"
          (click)="setActiveLink(link.label.toLowerCase())"
        >
          {{ link.label }}
        </a>
      }
    </div>

    <!-- Right Section: Lang, Theme, Social -->
    <div class="flex items-center gap-3">
      <!-- Language Selector -->
      <button
        class="flex h-9 px-4 items-center justify-center rounded-full border transition-colors text-xs font-bold tracking-wide bg-white dark:bg-surface-lighter border-slate-200 dark:border-white/5 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white hover:border-primary-brand/50 dark:hover:border-primary-brand/30"
        aria-label="Change language"
      >
        EN
      </button>

      <div class="h-6 w-px mx-1 bg-slate-200 dark:bg-white/10"></div>

      <!-- Theme Toggle -->
      <app-theme-toggle />

      <!-- GitHub Link -->
      <a
        href="https://github.com/BenavidesMichael/portfolio"
        target="_blank"
        rel="noopener noreferrer"
        class="size-9 flex items-center justify-center rounded-full border transition-all group bg-white dark:bg-surface-lighter border-slate-200 dark:border-white/5 text-slate-500 dark:text-slate-300 hover:bg-primary-brand hover:border-primary-brand hover:text-white"
        aria-label="GitHub profile"
      >
        <app-icon-github></app-icon-github>
      </a>

      <!-- Email Link -->
      <a
        href="mailto:contact@example.com"
        class="size-9 flex items-center justify-center rounded-full border transition-all group bg-white dark:bg-surface-lighter border-slate-200 dark:border-white/5 text-slate-500 dark:text-slate-300 hover:bg-blue-500 dark:hover:bg-blue-600 hover:border-blue-500 hover:text-white"
        aria-label="Send email"
      >
        <app-icon-mail></app-icon-mail>
      </a>
    </div>
  </nav>
</header>
