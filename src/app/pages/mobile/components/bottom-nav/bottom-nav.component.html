<!-- Bottom Tab Bar Navigation for Mobile -->
<nav
  class="fixed bottom-0 left-0 right-0 z-50 safe-area-bottom border-t bg-white dark:bg-surface-dark border-slate-200 dark:border-white/10 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] dark:shadow-[0_-4px_20px_rgba(0,0,0,0.15)]"
  role="navigation"
  aria-label="Mobile navigation"
>
  <div class="flex items-center justify-around px-2 py-2">
    @for (item of navItems; track item.href) {
      <a
        [href]="item.href"
        [attr.data-active]="activeLink() === item.label.toLowerCase() ? true : null"
        class="flex flex-col items-center justify-center min-w-16 py-2 px-3 rounded-xl transition-all duration-200 data-[active]:bg-primary-brand/15 dark:data-[active]:bg-primary-brand/10"
        (click)="setActiveLink(item.label.toLowerCase())"
        [attr.aria-current]="activeLink() === item.label.toLowerCase() ? 'page' : null"
      >
        <!-- Icon -->
        <span
          class="mb-1 transition-colors text-slate-500 dark:text-slate-400 data-[active]:text-primary-brand"
          [attr.data-active]="activeLink() === item.label.toLowerCase() ? true : null"
        >
          @switch (item.icon) {
            @case ('home') {
              <app-icon-home></app-icon-home>
            }
            @case ('user') {
              <app-icon-user></app-icon-user>
            }
            @case ('code') {
              <app-icon-code></app-icon-code>
            }
            @case ('mail') {
              <app-icon-mail></app-icon-mail>
            }
          }
        </span>

        <!-- Label -->
        <span
          class="text-xs font-medium transition-colors text-slate-500 dark:text-slate-400 data-[active]:text-primary-brand"
          [attr.data-active]="activeLink() === item.label.toLowerCase() ? true : null"
        >
          {{ item.label }}
        </span>
      </a>
    }
  </div>
</nav>
