@for (item of navItems; track item.href) {
  <button
    [class.dock-active]="isActive(item)"
    (click)="navigate(item)"
    [attr.aria-current]="isActive(item) ? 'page' : null"
  >
    @if (item.icon) {
      <app-nav-icon [name]="item.icon" />
    }
    <span class="dock-label">{{ item.label }}</span>
  </button>
}
