<div class="flex min-h-screen">
  <app-sidebar-nav />

  <div class="flex-1">
    <app-tablet-header />

    <main class="relative z-10">
      <div class="px-4">
        <div class="max-w-4xl mx-auto">
          <!-- 🚀 Hero Section - Loaded immediately -->
          <app-hero-section />

          <!-- 🚀 About Section - Deferred -->
          @defer (on viewport; prefetch on idle) {
            <app-about-section />
          } @placeholder {
            <div class="min-h-screen flex items-center justify-center">
              <span class="loading loading-spinner loading-md text-primary-brand"></span>
            </div>
          }

          <!-- 🚀 Stack Section - Deferred -->
          @defer (on viewport; prefetch on idle) {
            <app-stack-section />
          } @placeholder {
            <div class="min-h-screen flex items-center justify-center">
              <span class="loading loading-spinner loading-md text-primary-brand"></span>
            </div>
          }

          <!-- 🚀 Contact Section - Deferred -->
          @defer (on viewport; prefetch on idle) {
            <app-contact-section />
          } @placeholder {
            <div class="min-h-screen flex items-center justify-center">
              <span class="loading loading-spinner loading-md text-primary-brand"></span>
            </div>
          }
        </div>
      </div>
    </main>
  </div>
</div>
