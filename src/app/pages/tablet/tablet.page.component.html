<div class="flex min-h-screen">
  <app-sidebar-nav />

  <div class="flex-1">
    <main class="relative z-10">
      <div class="px-4">
        <div class="max-w-4xl mx-auto">
          <!-- Hero Section - Loaded immediately -->
          <div id="home">
            <app-hero-section />
          </div>

          <!-- About Section - Deferred -->
          <div id="about">
            @defer (on viewport; prefetch on idle) {
              <app-about-section />
            } @placeholder {
              <app-loading-placeholder size="loading-md" />
            }
          </div>

          <!-- Skills Section - Deferred -->
          <div id="skills">
            @defer (on viewport; prefetch on idle) {
              <app-skills-section />
            } @placeholder {
              <app-loading-placeholder size="loading-md" />
            }
          </div>

          <!-- Contact Section - Deferred -->
          <div id="contact">
            @defer (on viewport; prefetch on idle) {
              <app-contact-section />
            } @placeholder {
              <app-loading-placeholder size="loading-md" />
            }
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
