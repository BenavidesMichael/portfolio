<nav
  class="fixed left-0 top-0 bottom-0 z-50 w-56 flex flex-col border-r bg-base-100 border-base-300"
  aria-label="Tablet navigation"
>
  <!-- Logo Section -->
  <div class="p-5 border-b border-base-300">
    <a href="#home" class="flex items-center gap-3" (click)="setActiveLink('home')">
      <div class="size-9 flex items-center justify-center rounded-lg bg-primary/10">
        <app-icon-home />
      </div>
      <div class="flex flex-col">
        <span class="font-bold text-sm">DevPortfolio</span>
        <span class="text-xs text-base-content/50">v2.0</span>
      </div>
    </a>
  </div>

  <!-- Navigation Items -->
  <ul class="menu menu-sm flex-1 py-4 px-2">
    @for (item of navItems; track item.href) {
      <li>
        <a
          [href]="item.href"
          [class.active]="isActive(item.href)"
          (click)="setActiveLink(item.href.replace('#', ''))"
          [attr.aria-current]="isActive(item.href) ? 'page' : null"
        >
          @switch (item.icon) {
            @case ('home') {
              <app-icon-home />
            }
            @case ('evolution') {
              <app-icon-home />
            }
            @case ('code') {
              <app-icon-code />
            }
            @case ('folder') {
              <app-icon-code />
            }
            @case ('mail') {
              <app-icon-mail />
            }
          }
          {{ item.label }}
        </a>
      </li>
    }
  </ul>

  <!-- Footer Section -->
  <div class="p-4 border-t border-base-300">
    <!-- Status -->
    <div class="flex items-center justify-between mb-3">
      <span class="text-xs font-medium text-base-content/50">Open to work</span>
      <span class="flex items-center gap-1.5">
        <span class="badge badge-xs badge-success animate-pulse"></span>
        <span class="text-xs text-success font-medium">Available</span>
      </span>
    </div>

    <div class="flex items-center gap-2">
      <app-theme-toggle />

      <a
        href="https://github.com/BenavidesMichael"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-ghost btn-square btn-sm"
        aria-label="GitHub"
      >
        <app-icon-github />
      </a>

      <a
        href="https://linkedin.com/in/michael-benavides"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-ghost btn-square btn-sm"
        aria-label="LinkedIn"
      >
        <app-icon-linkedin />
      </a>
    </div>
  </div>
</nav>
