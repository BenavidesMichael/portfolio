<!-- Left Sidebar Navigation for Tablet -->
<aside
  class="fixed left-0 top-0 bottom-0 z-50 w-56 flex flex-col border-r"
  [class.bg-surface-dark]="themeService.isDark()"
  [class.border-white/10]="themeService.isDark()"
  [class.bg-white]="!themeService.isDark()"
  [class.border-slate-200]="!themeService.isDark()"
  role="navigation"
  aria-label="Tablet navigation"
>
  <!-- Logo Section -->
  <div
    class="p-5 border-b"
    [class.border-white/10]="themeService.isDark()"
    [class.border-slate-200]="!themeService.isDark()"
  >
    <a href="#home" class="flex items-center gap-3" (click)="setActiveLink('home')">
      <div
        class="size-9 flex items-center justify-center rounded-lg"
        [class.bg-primary-brand/10]="themeService.isDark()"
        [class.bg-primary-brand/20]="!themeService.isDark()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="size-5 text-primary-brand"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M5 7l5 5l-5 5" />
          <path d="M12 19l7 0" />
        </svg>
      </div>
      <div class="flex flex-col">
        <span
          class="font-bold text-sm"
          [class.text-slate-100]="themeService.isDark()"
          [class.text-slate-800]="!themeService.isDark()"
        >
          DevPortfolio
        </span>
        <span
          class="text-xs"
          [class.text-slate-500]="themeService.isDark()"
          [class.text-slate-400]="!themeService.isDark()"
        >
          v2.0
        </span>
      </div>
    </a>
  </div>

  <!-- Navigation Items -->
  <nav class="flex-1 py-4 px-3 overflow-y-auto">
    <ul class="space-y-1">
      @for (item of navItems; track item.href) {
        <li>
          <a
            [href]="item.href"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200"
            [class.bg-primary-brand/10]="isActive(item.href) && themeService.isDark()"
            [class.text-primary-brand]="isActive(item.href)"
            [class.bg-primary-brand/15]="isActive(item.href) && !themeService.isDark()"
            [class.text-slate-400]="!isActive(item.href) && themeService.isDark()"
            [class.text-slate-600]="!isActive(item.href) && !themeService.isDark()"
            [class.hover:bg-white/5]="!isActive(item.href) && themeService.isDark()"
            [class.hover:bg-slate-100]="!isActive(item.href) && !themeService.isDark()"
            [class.hover:text-slate-200]="!isActive(item.href) && themeService.isDark()"
            [class.hover:text-slate-900]="!isActive(item.href) && !themeService.isDark()"
            (click)="setActiveLink(item.href.replace('#', ''))"
            [attr.aria-current]="isActive(item.href) ? 'page' : null"
          >
            <!-- Icon -->
            @switch (item.icon) {
              @case ('home') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="size-5"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M5 12l-2 0l9 -9l9 9l-2 0" />
                  <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" />
                  <path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6" />
                </svg>
              }
              @case ('evolution') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="size-5"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M3 17l6 -6l4 4l8 -8" />
                  <path d="M14 7l7 0l0 7" />
                </svg>
              }
              @case ('code') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="size-5"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M7 8l-4 4l4 4" />
                  <path d="M17 8l4 4l-4 4" />
                  <path d="M14 4l-4 16" />
                </svg>
              }
              @case ('folder') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="size-5"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2"
                  />
                </svg>
              }
              @case ('mail') {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="size-5"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10z"
                  />
                  <path d="M3 7l9 6l9 -6" />
                </svg>
              }
            }
            {{ item.label }}
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer Section -->
  <div
    class="p-4 border-t"
    [class.border-white/10]="themeService.isDark()"
    [class.border-slate-200]="!themeService.isDark()"
  >
    <!-- Theme Toggle -->
    <div class="flex items-center justify-between mb-3">
      <span
        class="text-xs font-medium"
        [class.text-slate-500]="themeService.isDark()"
        [class.text-slate-400]="!themeService.isDark()"
      >
        Open to work
      </span>
      <span class="flex items-center gap-1.5">
        <span class="size-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span class="text-xs text-emerald-500 font-medium">Available</span>
      </span>
    </div>

    <div class="flex items-center gap-2">
      <app-theme-toggle />

      <!-- GitHub -->
      <a
        href="https://github.com/BenavidesMichael"
        target="_blank"
        rel="noopener noreferrer"
        class="size-9 flex items-center justify-center rounded-lg transition-colors"
        [class.bg-surface-lighter]="themeService.isDark()"
        [class.hover:bg-white/10]="themeService.isDark()"
        [class.text-slate-400]="themeService.isDark()"
        [class.hover:text-white]="themeService.isDark()"
        [class.bg-slate-100]="!themeService.isDark()"
        [class.hover:bg-slate-200]="!themeService.isDark()"
        [class.text-slate-500]="!themeService.isDark()"
        [class.hover:text-slate-900]="!themeService.isDark()"
        aria-label="GitHub"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5"
          />
        </svg>
      </a>

      <!-- LinkedIn -->
      <a
        href="https://linkedin.com/in/michael-benavides"
        target="_blank"
        rel="noopener noreferrer"
        class="size-9 flex items-center justify-center rounded-lg transition-colors"
        [class.bg-surface-lighter]="themeService.isDark()"
        [class.hover:bg-white/10]="themeService.isDark()"
        [class.text-slate-400]="themeService.isDark()"
        [class.hover:text-white]="themeService.isDark()"
        [class.bg-slate-100]="!themeService.isDark()"
        [class.hover:bg-slate-200]="!themeService.isDark()"
        [class.text-slate-500]="!themeService.isDark()"
        [class.hover:text-slate-900]="!themeService.isDark()"
        aria-label="LinkedIn"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"
          />
          <path d="M8 11l0 5" />
          <path d="M8 8l0 .01" />
          <path d="M12 16l0 -5" />
          <path d="M16 16v-3a2 2 0 0 0 -4 0" />
        </svg>
      </a>
    </div>
  </div>
</aside>
