<header class="navbar sticky top-0 z-50 bg-gray-950/95 border-b border-gray-700 backdrop-blur-sm">
  <div class="navbar-start">
    <a href="#hero" class="btn btn-ghost text-xl font-bold">
      <span class="text-primary">{{ data.logo.text }}</span>
      <span class="hidden sm:inline">{{ data.logo.subtext }}</span>
    </a>
  </div>

  <div class="navbar-end">
    <nav class="hidden md:flex gap-1">
      @for (link of data.navLinks; track link.href) {
        <a
          [href]="link.href"
          class="btn btn-sm"
          [class.btn-ghost]="!link.isPrimary"
          [class.btn-primary]="link.isPrimary"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </div>
</header>
