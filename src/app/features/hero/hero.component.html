<section
  class="h-[calc(100dvh-var(--height-navbar))] sm:h-auto sm:min-h-screen flex flex-col items-center justify-center gap-6 py-6 sm:py-12 text-center"
>
  <!-- Profile photo with "Disponible" badge -->
  <div class="relative">
    <div
      class="size-32 rounded-full ring-4 ring-primary/30 bg-linear-to-br from-primary/20 to-base-300 flex items-center justify-center overflow-hidden"
    >
      <span class="text-5xl" aria-hidden="true">👨‍💻</span>
    </div>
    <span
      class="badge badge-success badge-sm absolute -bottom-1 right-0 animate-pulse motion-reduce:animate-none"
    >
      {{ 'hero.available' | transloco }}
    </span>
  </div>

  <!-- Name & title -->
  <div class="space-y-1">
    <h1 class="text-4xl font-bold font-display text-primary">Michael Benavides</h1>
    <p class="text-xl">{{ 'hero.title' | transloco }}</p>
  </div>

  <!-- Info row -->
  <p class="flex items-center gap-2 text-base-content/70 text-sm">
    <app-icon-briefcase size="sm" />
    <span>{{ 'hero.years-exp' | transloco }}</span>
    <span aria-hidden="true">·</span>
    <app-icon-map-pin size="sm" />
    <span>{{ 'hero.location' | transloco }}</span>
  </p>

  <!-- Social icons -->
  <nav class="flex gap-3" aria-label="Social links">
    <a
      href="https://github.com/BenavidesMichael"
      target="_blank"
      rel="noopener noreferrer"
      class="btn btn-circle btn-outline btn-sm"
      aria-label="GitHub"
    >
      <app-icon-github />
    </a>
    <a
      href="https://www.linkedin.com/in/benavides-michael-a38062a9/"
      target="_blank"
      rel="noopener noreferrer"
      class="btn btn-circle btn-outline btn-sm"
      aria-label="LinkedIn"
    >
      <app-icon-linkedin />
    </a>
    <a
      href="mailto:benavides.michael.munoz@gmail.com"
      class="btn btn-circle btn-outline btn-sm"
      aria-label="Email"
    >
      <app-icon-mail />
    </a>
  </nav>

  <!-- CV download -->
  <button
    class="btn btn-primary btn-lg w-full max-w-xs"
    [disabled]="isGenerating()"
    (click)="downloadCv()"
  >
    @if (isGenerating()) {
      <span class="loading loading-spinner loading-sm"></span>
      <span>{{ 'hero.generating' | transloco }}</span>
    } @else {
      <app-icon-download />
      <span>{{ 'hero.download-cv' | transloco }}</span>
    }
  </button>

  <!-- Language switcher -->
  <app-language-switcher />
</section>
